services:
  - type: web
    name: eventpass
    env: php
    plan: free
    buildCommand: |
      composer install
      npm install
      npm run build
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
